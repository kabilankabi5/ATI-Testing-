<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Food Booking & Delivery</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f8f8f8; }
    header { background: #ff5722; color: white; padding: 15px; text-align: center; }
    nav { background: #333; padding: 10px; text-align: center; }
    nav a { color: white; margin: 0 10px; text-decoration: none; }
    .container { padding: 20px; }
    .food-item { background: white; padding: 15px; margin: 10px; border-radius: 5px; display: inline-block; width: 200px; text-align: center; }
    .food-item button { background: #ff5722; color: white; border: none; padding: 8px; margin-top: 10px; cursor: pointer; border-radius: 4px; }
    #cart { background: white; padding: 15px; margin-top: 20px; border-radius: 5px; }
    footer { background: #333; color: white; text-align: center; padding: 10px; margin-top: 20px; }
  </style>
</head>
<body>
  <header>
    <h1>🍔 Online Food Booking</h1>
    <p>Customize and order your favorite meals</p>
  </header>

  <nav>
    <a href="#">Home</a>
    <a href="#">Menu</a>
    <a href="#">Cart</a>
    <a href="#">Contact</a>
  </nav>

  <div class="container">
    <h2>Menu</h2>
    <div class="food-item">
      <h3>Burger</h3>
      <p>Rs. 500</p>
      <button onclick="addToCart('Burger', 500)">Add to Cart</button>
    </div>
    <div class="food-item">
      <h3>Pizza</h3>
      <p>Rs. 800</p>
      <button onclick="addToCart('Pizza', 800)">Add to Cart</button>
    </div>
    <div class="food-item">
      <h3>Kottu</h3>
      <p>Rs. 600</p>
      <button onclick="addToCart('Kottu', 600)">Add to Cart</button>
    </div>

    <div id="cart">
      <h2>Your Cart</h2>
      <ul id="cart-items"></ul>
      <p><strong>Total: Rs. <span id="total">0</span></strong></p>
      <button onclick="checkout()">Checkout</button>
    </div>
  </div>

  <footer>
    <p>© 2026 Food Delivery Service</p>
  </footer>

  <script>
    let cart = [];
    let total = 0;

    function addToCart(item, price) {
      cart.push({item, price});
      total += price;
      displayCart();
    }

    function displayCart() {
      const cartList = document.getElementById('cart-items');
      cartList.innerHTML = '';
      cart.forEach(c => {
        const li = document.createElement('li');
        li.textContent = `${c.item} - Rs. ${c.price}`;
        cartList.appendChild(li);
      });
      document.getElementById('total').textContent = total;
    }

    function checkout() {
      alert("Thank you! Your food will be delivered soon.");
      cart = [];
      total = 0;
      displayCart();
    }
  </script>
</body>
</html>
